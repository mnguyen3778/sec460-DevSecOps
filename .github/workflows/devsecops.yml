name: SEC460 DevSecOps Pipeline (Enterprise Final v3)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:

# =========================
# LINT (FIXED FOR YOUR REPO)
# =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff (entire repo)
        run: ruff check .

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint (ignore if none)
        run: htmlhint "**/*.html" || true

# =========================
# SECRETS (ENFORCED)
# =========================
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run TruffleHog
        run: |
          docker run --rm \
            -v $PWD:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified \
            --json > secrets.json

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Count secrets
        id: metrics
        run: |
          COUNT=$(jq -s length secrets.json)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrets-json
          path: secrets.json

      - name: Enforce secrets policy
        run: |
          COUNT=${{ steps.metrics.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Verified secrets found"
            exit 1
          fi

# =========================
# SAST (SEMGREP)
# =========================
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --sarif --output semgrep.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif

# =========================
# SCA (TRIVY)
# =========================
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif

# =========================
# SECURITY GATE (REAL)
# =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: [lint, secrets, sast, sca]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Debug files
        run: ls -R reports || true

      - name: Calculate Risk Score
        id: risk
        run: |
          SCORE=0

          # Secrets
          if [ -f reports/secrets-json/secrets.json ]; then
            COUNT=$(jq -s length reports/secrets-json/secrets.json)
            SCORE=$((SCORE + COUNT * 25))
          fi

          # Trivy
          if [ -f reports/trivy-report/trivy.sarif ]; then
            HIGH=$(grep -c '"level":"error"' reports/trivy-report/trivy.sarif || true)
            SCORE=$((SCORE + HIGH * 10))
          fi

          # Semgrep
          if [ -f reports/semgrep-report/semgrep.sarif ]; then
            ERR=$(grep -c '"level":"error"' reports/semgrep-report/semgrep.sarif || true)
            SCORE=$((SCORE + ERR * 5))
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Risk Score: $SCORE"

      - name: Enforce policy
        run: |
          SCORE=${{ steps.risk.outputs.score }}

          echo "Branch: $GITHUB_REF"
          echo "Score: $SCORE"

          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            if [ "$SCORE" -gt 0 ]; then
              echo "❌ BLOCKED (main requires zero risk)"
              exit 1
            fi
          else
            if [ "$SCORE" -gt 50 ]; then
              echo "❌ BLOCKED (risk too high)"
              exit 1
            fi
          fi

          echo "✅ PASSED"

      - name: PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.risk.outputs.score }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔐 DevSecOps Risk Score: **${score}**\n\nPolicy:\n- main: 0 only\n- PR/dev: <= 50`
            });
