name: SEC460 DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

# =========================
# SAST (Code Analysis)
# =========================
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Bandit (show + save report)
        run: |
          pip install bandit
          bandit -r . -ll || true
          bandit -r . -f json -o bandit-report.json || true

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Upload SAST artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: bandit-report.json

      - name: SAST Security Gate
        run: |
          echo "🔍 Checking for SAST failures..."
          if grep -q "issue" bandit-report.json; then
            echo "❌ SECURITY GATE FAILED (SAST)"
            exit 1
          else
            echo "✅ SAST PASSED"
          fi

# =========================
# SCA (Dependencies)
# =========================
  sca:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit || true

      - name: SCA Security Gate
        run: |
          echo "🔍 Checking dependency vulnerabilities..."
          pip-audit --strict && echo "✅ SCA PASSED" || (echo "❌ SECURITY GATE FAILED (SCA)" && exit 1)

# =========================
# Secrets Scanning
# =========================
  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

# =========================
# IaC Scanning
# =========================
  iac:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: true
          soft_fail: true

      - name: IaC Security Gate
        run: |
          echo "🔍 Checking IaC misconfigurations..."
          checkov -d . || (echo "❌ SECURITY GATE FAILED (IaC)" && exit 1)

# =========================
# Container Scanning
# =========================
  container:
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myapp .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: myapp
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

# =========================
# PR Comment
# =========================
  pr-comment:
    runs-on: ubuntu-latest
    needs: [container]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: PR Comment Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ SECURITY GATE PASSED - No critical vulnerabilities."
            })

      - name: PR Comment Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ SECURITY GATE FAILED - Fix vulnerabilities before merge."
            })
