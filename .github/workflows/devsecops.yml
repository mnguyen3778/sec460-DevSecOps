name: SEC460 DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

# ---------------------------
# SAST
# ---------------------------
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: SAST Gate Message
        if: failure()
        run: |
          echo "❌ SECURITY GATE FAILED (SAST)"
          exit 1

# ---------------------------
# SCA
# ---------------------------
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Dependency Scan
        run: |
          pip install pip-audit
          pip-audit

      - name: Node Dependency Scan
        run: |
          if [ -f package.json ]; then
            npm install
            npm audit --audit-level=high
          fi

      - name: SCA Gate Message
        if: failure()
        run: |
          echo "❌ SECURITY GATE FAILED (SCA)"
          exit 1

# ---------------------------
# SECRETS
# ---------------------------
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            git file:///repo --json > secrets-report.json

      - name: Fail if secrets found
        run: |
          if [ -s secrets-report.json ]; then
            echo "❌ SECURITY GATE FAILED (SECRETS)"
            exit 1
          fi

# ---------------------------
# IaC
# ---------------------------
  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .

      - name: IaC Gate Message
        if: failure()
        run: |
          echo "❌ SECURITY GATE FAILED (IaC)"
          exit 1

# ---------------------------
# CONTAINER + FINAL GATE
# ---------------------------
  container:
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t redact-app .

      - name: Run Trivy Scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: redact-app
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            trivy-results.sarif
            secrets-report.json

      - name: Final Security Gate Message
        if: failure()
        run: |
          echo "🚫 PIPELINE BLOCKED"
          echo "Critical/High vulnerabilities detected."
          exit 1

      - name: Success Message
        if: success()
        run: |
          echo "✅ SECURITY GATE PASSED"

# ---------------------------
# PR COMMENTS
# ---------------------------
  pr-comment:
    runs-on: ubuntu-latest
    needs: [container]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: PR Comment Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ SECURITY GATE PASSED - No critical vulnerabilities."
            })

      - name: PR Comment Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚫 SECURITY GATE FAILED - Fix vulnerabilities before merge."
            })
