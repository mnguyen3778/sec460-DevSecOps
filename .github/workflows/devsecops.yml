name: SEC460 DevSecOps Pipeline (Enterprise Final v2)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:

# =========================
# LINT (QUALITY GATE)
# =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python
      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . --max-warnings=0

      - name: Prettier check
        run: |
          cd frontend
          npx prettier --check .

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint "**/*.html"

# =========================
# SECRETS (TRUFFLEHOG)
# =========================
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run TruffleHog
        run: |
          docker run --rm \
            -v $PWD:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified \
            --json > secrets.json

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Count secrets
        id: metrics
        run: |
          COUNT=$(jq -s length secrets.json)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # SARIF
      - name: Convert to SARIF
        run: |
          jq -n --argjson c ${{ steps.metrics.outputs.count }} '{
            version: "2.1.0",
            runs: [{
              tool: { driver: { name: "TruffleHog" } },
              results: (if $c == 0 then [] else [{
                ruleId: "verified-secret",
                level: "error",
                message: { text: "Verified secret detected" }
              }] end)
            }]
          }' > secrets.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: secrets.sarif

      # ARTIFACTS (CRITICAL)
      - name: Upload secrets JSON
        uses: actions/upload-artifact@v4
        with:
          name: secrets-json
          path: secrets.json

# =========================
# SAST (SEMGREP)
# =========================
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --sarif --output semgrep.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif

# =========================
# SCA (TRIVY)
# =========================
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif

# =========================
# ENTERPRISE SECURITY GATE
# =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: [lint, secrets, sast, sca]

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Debug reports
        run: |
          echo "=== REPORT FILES ==="
          ls -R reports || true

      # =========================
      # RISK SCORING
      # =========================
      - name: Calculate Risk Score
        id: risk
        run: |
          SCORE=0

          # Secrets (HIGH WEIGHT)
          if [ -f reports/secrets-json/secrets.json ]; then
            COUNT=$(jq -s length reports/secrets-json/secrets.json)
            SCORE=$((SCORE + COUNT * 25))
            echo "Secrets: $COUNT"
          fi

          # Trivy
          if [ -f reports/trivy-report/trivy.sarif ]; then
            HIGH=$(grep -c '"level":"error"' reports/trivy-report/trivy.sarif || true)
            SCORE=$((SCORE + HIGH * 10))
            echo "Trivy findings: $HIGH"
          fi

          # Semgrep
          if [ -f reports/semgrep-report/semgrep.sarif ]; then
            ERR=$(grep -c '"level":"error"' reports/semgrep-report/semgrep.sarif || true)
            SCORE=$((SCORE + ERR * 5))
            echo "Semgrep findings: $ERR"
          fi

          echo "Final Score: $SCORE"
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      # =========================
      # POLICY ENFORCEMENT
      # =========================
      - name: Enforce Policy
        run: |
          SCORE=${{ steps.risk.outputs.score }}

          echo "Branch: $GITHUB_REF"
          echo "Risk Score: $SCORE"

          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            if [ "$SCORE" -gt 0 ]; then
              echo "❌ BLOCKED (main requires 0 risk)"
              exit 1
            fi
          else
            if [ "$SCORE" -gt 50 ]; then
              echo "❌ BLOCKED (risk too high)"
              exit 1
            fi
          fi

          echo "✅ PASSED"

      # =========================
      # PR COMMENT
      # =========================
      - name: PR Risk Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.risk.outputs.score }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔐 DevSecOps Risk Score: **${score}**\n\nPolicy:\n- main: 0 only\n- PR/dev: <= 50`
            });
