name: SEC460 DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # =========================
  # SAST (Code Analysis)
  # =========================
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r . -f json -o bandit-report.json || true

      - name: Run Semgrep
        run: |
          docker run --rm -v "$PWD:/src" returntocorp/semgrep-agent:v1 \
          semgrep ci || true

      - name: Upload SAST artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json

      - name: SAST Security Gate
        run: |
          echo "❌ SECURITY GATE FAILED (SAST)"
          exit 1

  # =========================
  # SCA (Dependency Scan)
  # =========================
  sca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit || true

      - name: SCA Security Gate
        run: |
          echo "❌ SECURITY GATE FAILED (SCA)"
          exit 1

  # =========================
  # SECRETS (TruffleHog Verified)
  # =========================
  secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run TruffleHog (Verified Only)
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
          git file:///repo \
          --only-verified \
          --json > trufflehog.json

      - name: Upload Secrets Report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-report
          path: trufflehog.json

      - name: Secrets Security Gate
        run: |
          if [ -s trufflehog.json ]; then
            echo "❌ VERIFIED SECRETS FOUND"
            exit 1
          else
            echo "✅ No verified secrets"
          fi

  # =========================
  # IaC (Terraform Scan)
  # =========================
  iac:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  # =========================
  # Container Scan
  # =========================
  container:
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:latest . || true

      - name: Scan container with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: app:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  # =========================
  # PR COMMENT (Optional)
  # =========================
  pr-comment:
    runs-on: ubuntu-latest
    needs: [container]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ job.status }}";
            const msg = status === "success"
              ? "✅ SECURITY GATE PASSED"
              : "❌ SECURITY GATE FAILED - Issues detected";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: msg
            });
