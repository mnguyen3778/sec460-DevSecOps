name: SEC460 DevSecOps Pipeline (Enterprise)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write   # REQUIRED for SARIF upload

jobs:

# =========================
# SECRETS (VERIFIED ONLY) + DASHBOARD + SARIF
# =========================
  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run TruffleHog (verified only)
        run: |
          docker run --rm \
            -v $PWD:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --only-verified \
            --json > secrets.json

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Parse metrics
        id: metrics
        run: |
          TOTAL=$(jq -s length secrets.json)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      # ---------- Build SARIF (so it shows in GitHub Security tab) ----------
      - name: Convert to SARIF
        run: |
          jq -n --argjson count ${{ steps.metrics.outputs.total }} '{
            version: "2.1.0",
            runs: [{
              tool: { driver: { name: "TruffleHog Verified Scan" } },
              results: (
                if $count == 0 then []
                else [
                  {
                    ruleId: "verified-secret",
                    level: "error",
                    message: { text: "Verified secret detected" }
                  }
                ] end
              )
            }]
          }' > secrets.sarif

      - name: Upload SARIF (Security Tab)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secrets.sarif

      # ---------- Dashboard (HTML + Chart) ----------
      - name: Generate HTML Dashboard
        run: |
          TOTAL=${{ steps.metrics.outputs.total }}

          cat <<EOF > dashboard.html
          <html>
          <head>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style>
              body { background:#0f172a; color:white; font-family:Arial; padding:20px;}
              .card { background:#1e293b; padding:20px; border-radius:10px;}
            </style>
          </head>
          <body>
            <h1>🔐 Enterprise Security Dashboard</h1>
            <div class="card">
              <h2>Verified Secrets: $TOTAL</h2>
              <canvas id="chart"></canvas>
            </div>

            <script>
              new Chart(document.getElementById('chart'), {
                type: 'bar',
                data: {
                  labels: ['Secrets'],
                  datasets: [{
                    label: 'Verified Findings',
                    data: [$TOTAL]
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Upload Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard.html

      - name: Upload Raw
        uses: actions/upload-artifact@v4
        with:
          name: secrets-json
          path: secrets.json

      # ---------- PR COMMENT ----------
      - name: PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = "${{ steps.metrics.outputs.total }}";
            const msg = total > 0
              ? `❌ **Security Gate FAILED**\n\n${total} verified secrets detected.`
              : `✅ **Security Gate PASSED**\n\nNo verified secrets.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: msg
            });

      # ---------- ENFORCEMENT ----------
      - name: Enforce Gate
        run: |
          COUNT=${{ steps.metrics.outputs.total }}
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Blocking deployment"
            exit 1
          else
            echo "✅ Safe"
          fi

# =========================
# SAST → SARIF (Semgrep)
# =========================
  sast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (SARIF)
        run: |
          pip install semgrep
          semgrep --config auto --sarif --output semgrep.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

# =========================
# SCA → SARIF (Trivy)
# =========================
  sca:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
