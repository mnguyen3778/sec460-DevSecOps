name: SEC460 DevSecOps Pipeline (Enterprise Final v5)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:

  # =========================
  # LINT
  # =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .

  # =========================
  # SECRETS (CORRECT FIX)
  # =========================
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run TruffleHog (tracked files only)
        run: |
          git ls-files -z | xargs -0 -I {} docker run --rm \
            -v $PWD:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo/{} \
            --fail

  # =========================
  # SAST (SEMGREP)
  # =========================
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --sarif --output semgrep.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  # =========================
  # SCA (TRIVY)
  # =========================
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

  # =========================
  # SECURITY GATE
  # =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: [lint, secrets, sast, sca]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Calculate Risk Score
        id: risk
        run: |
          SCORE=0

          TRIVY_FILE=$(find reports -name "trivy.sarif" | head -n 1)
          if [ -n "$TRIVY_FILE" ]; then
            HIGH=$(grep -c '"level":"error"' "$TRIVY_FILE" || true)
            SCORE=$((SCORE + HIGH * 10))
          fi

          SEMGREP_FILE=$(find reports -name "semgrep.sarif" | head -n 1)
          if [ -n "$SEMGREP_FILE" ]; then
            ERR=$(grep -c '"level":"error"' "$SEMGREP_FILE" || true)
            SCORE=$((SCORE + ERR * 5))
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Risk Score: $SCORE"

      - name: Enforce policy
        run: |
          SCORE=${{ steps.risk.outputs.score }}

          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            if [ "$SCORE" -gt 0 ]; then
              echo "❌ BLOCKED (main requires zero risk)"
              exit 1
            fi
          else
            if [ "$SCORE" -gt 50 ]; then
              echo "❌ BLOCKED (risk too high)"
              exit 1
            fi
          fi

          echo "✅ PASSED"

      - name: PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.risk.outputs.score }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔐 DevSecOps Risk Score: **${score}**\n\nPolicy:\n- main: 0 only\n- PR/dev: <= 50`
            });
